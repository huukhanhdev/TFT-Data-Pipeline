version: '3.8'

services:
  magic:
    image: mageai/mageai:latest
    command: mage start /home/src/tft_pipeline
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      USER_CODE_PATH: /home/src/tft_pipeline
      MAGE_IS_STAGING_ENV: "false"
      MAGE_AUTHENTICATION_ENABLED: "0"
      MAGE_DATABASE_CONNECTION_URL: sqlite:////home/src/tft_pipeline/mage-ai.db
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - 6789:6789
    volumes:
      - .:/home/src/
    restart: on-failure:5
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DBNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  superset:
    image: apache/superset:latest
    container_name: superset
    ports:
      - "8088:8088"
    user: root
    environment:
      SUPERSET_SECRET_KEY: 'tft-api-project-secret-key-12345'
      # Automatically install drivers if possible, but the command below is more reliable for now
    command: >
      sh -c "pip install psycopg2-binary && superset db upgrade && superset init && /usr/bin/run-server.sh"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
