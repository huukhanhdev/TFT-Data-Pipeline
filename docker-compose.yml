version: '3.8'

services:
  magic:
    image: mageai/mageai:latest
    command: mage start /home/src/tft_pipeline
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      USER_CODE_PATH: /home/src/tft_pipeline
      MAGE_IS_STAGING_ENV: "false"
      MAGE_AUTHENTICATION_ENABLED: "0"
      MAGE_DATABASE_CONNECTION_URL: sqlite:////home/src/tft_pipeline/mage-ai.db
      POSTGRES_DBNAME: ${POSTGRES_DBNAME}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - 6789:6789
    volumes:
      - .:/home/src/
    restart: on-failure:5
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DBNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  superset:
    image: apache/superset:latest
    command: >
      sh -c "pip install --target /app/.venv/lib/python3.10/site-packages psycopg2-binary && /usr/bin/run-server.sh"
    ports:
      - "8088:8088"
    user: root
    environment:
      SUPERSET_SECRET_KEY: 'tft-api-project-secret-key-12345'
    depends_on:
      - postgres

volumes:
  pgdata:
